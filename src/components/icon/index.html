<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="../../build/stencil-component-library.esm.js"></script>
    <script nomodule src="../../build/stencil-component-library.js"></script>

    <link rel="stylesheet" href="../../build/stencil-component-library.css" />

    <link rel="stylesheet" href="../../assets/mdi/materialdesignicons.min.css" />

    <style>
      .cwrapper {
        margin: 10px;
      }

      button {
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      .purple {
        background-color: purple !important;
        color: white !important;
      }
    </style>
  </head>
  <body>
    <!-- <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
     -->
    <app-wrapper>
      <div class="cwrapper">
        <icon-component icon="mdi mdi-home" size="sm"></icon-component>

        <icon-component icon="fa-solid fa-house" size="md" color="red"></icon-component>

        <icon-component icon="fa-solid fa-house" size="lg"></icon-component>

        <icon-component icon="fa-solid fa-house" icon-size="72"></icon-component>

        <badge-component id="badge4" bdg-position="left" elevation="3" outlined variant="purple" token addBorder background-color="amber" shape="circle" inset
          ><button type="button" class="btn btn-outline-secondary btn-sm">Badge Small</button
          ><span slot="token"> <icon-component icon="fa-solid fa-house" icon-size="10" token-icon></icon-component></span
        ></badge-component>
      </div>
    </app-wrapper>

    <script type="module"></script>
  </body>
</html>
