<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="../../build/stencil-component-library.esm.js"></script>
    <script nomodule src="../../build/stencil-component-library.js"></script>

    <link rel="stylesheet" href="../../build/stencil-component-library.css" />

    <link rel="stylesheet" href="../../assets/mdi/materialdesignicons.min.css" />

    <style>
      .cwrapper {
        margin: 10px;
      }

      button {
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      .purple {
        background-color: purple !important;
        color: white !important;
      }
    </style>
  </head>
  <body>
    <!-- <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
     -->
    <app-wrapper>
      <div class="cwrapper">
        <!-- ==========================  Linear (basic) ========================== -->
        <progress-display-component value="45" max="100" label="Processing…" variant="primary" show-progress id="progressBarCompA" progress-align="right">
        </progress-display-component>

        <progress-display-component value="45" max="100" variant="primary" show-progress id="progressBarComp" progress-align="right"></progress-display-component>

        <script type="module">
          document.addEventListener('DOMContentLoaded', () => {
            const progressBarComp = document.getElementById('progressBarComp');
            let value1 = 0;

            let interval1 = setInterval(() => {
              if (value1 >= 100) {
                value1 = 0; // Reset the value
              } else {
                value1 += 10; // Increment the value
              }
              progressBarComp.setAttribute('value', value1); // Update the progress component
            }, 1000);

            // Clean up the interval when the window is unloaded or when you want to stop the interval
            window.addEventListener('beforeunload', () => {
              clearInterval(interval1);
            });
          });
        </script>

        <!-- With percentage and 1-decimal precision -->
        <!-- <progress-display-component value="67" max="120" show-progress precision="1" variant="success"></progress-display-component> -->

        <!-- Slot text aligned right -->
        <progress-display-component value="30" progress-align="right" variant="info"> Loading files… </progress-display-component>

        <!-- Slot text aligned left -->
        <progress-display-component value="85" progress-align="left" variant="secondary"> Uploading… </progress-display-component>

        <!-- Striped + animated -->
        <progress-display-component value="55" striped animated height="18" variant="warning"></progress-display-component>

        <!-- Show computed value (value/2 like original) -->
        <progress-display-component value="40" show-value precision="0" variant="dark"> Task </progress-display-component>

        <hr />

        <!-- ==========================  Multi-bar (attribute)    ========================= -->
        <!-- Pass bars as JSON when using plain HTML -->
        <progress-display-component
          multi
          height="20"
          bars='[
            { "value": 25, "variant": "primary",  "showProgress": true },
            { "value": 15, "variant": "success",  "striped": true, "animated": true },
            { "value": 10, "variant": "danger",   "animated": true, "progressAlign": "right", "showProgress": true  }
          ]'
        >
          <span slot="bar-2">Danger chunk</span>
        </progress-display-component>

        <!-- Multi-bar with named slots for labels -->
        <progress-display-component
          multi
          height="22"
          bars='[
            { "value": 40, "variant": "info",     "progressAlign": "left"  },
            { "value": 20, "variant": "warning",  "progressAlign": "right" }
          ]'
        >
          <span slot="bar-0">Info chunk</span>
          <span slot="bar-1">Warn chunk</span>
        </progress-display-component>

        <!-- OR set bars via JS (cleaner than JSON for complex data) -->
        <div id="multi-js"></div>
        <script type="module">
          const host = document.getElementById('multi-js');
          host.innerHTML = `<progress-display-component multi height="24"></progress-display-component>`;
          const el = host.querySelector('progress-display-component');
          el.bars = [
            { value: 30, variant: 'success', showProgress: true },
            { value: 20, variant: 'danger', animated: true, striped: true, precision: 1 },
          ];
        </script>

        <hr />

        <!-- ==========================  Circular  ========================== -->
        <!-- Basic circular (size in px; width = stroke width) -->
        <progress-display-component
          id="progressComp"
          circular
          value="65"
          max="100"
          size="96"
          width="6"
          variant="primary"
          animate="true"
          show-progress
          precision="0"
        ></progress-display-component>

        <!-- Circular with rotate and square line-cap -->
        <progress-display-component circular value="40" size="80" width="8" rotate="90" line-cap variant="success" show-progress></progress-display-component>

        <!-- Circular with showValue (value/2 behavior) -->
        <progress-display-component circular value="50" size="84" width="6" variant="warning" show-value></progress-display-component>

        <!-- Indeterminate spinner-like circular -->
        <progress-display-component circular indeterminate size="72" width="5" variant="info"></progress-display-component>

        <!-- Text color classes are applied based on variant (e.g., warning uses darker text) -->

        <hr />

        <!-- ==========================  Mixed layout example      ========================== -->
        <div style="display: flex; gap: 20px; align-items: center">
          <progress-display-component circular value="75" size="64" width="6" variant="secondary" show-progress></progress-display-component>
          <div style="flex: 1">
            <progress-display-component value="75" show-progress precision="0" variant="secondary"></progress-display-component>
            <small>Processing… 75%</small>
          </div>
        </div>

        <hr />
        <div style="display: flex; gap: 20px; align-items: center">
          <progress-display-component value="100" circular width="3" size="30"></progress-display-component>

          <progress-display-component value="80" circular variant="info" size="50" width="5"> </progress-display-component>

          <progress-display-component value="60" circular variant="warning" size="75" width="8"> </progress-display-component>

          <progress-display-component value="40" circular variant="danger" size="100" width="10"> </progress-display-component>
        </div>

        <hr />

        <div style="display: flex; align-items: center; justify-content: space-evenly">
          <progress-display-component value="35" circular size="100" line-cap> </progress-display-component>

          <progress-display-component value="80" circular variant="info" size="100" line-cap> </progress-display-component>

          <progress-display-component value="60" circular variant="warning" size="100" line-cap> </progress-display-component>

          <progress-display-component value="40" circular variant="danger" size="100" line-cap> </progress-display-component>
        </div>
      </div>
    </app-wrapper>

    <script type="module">
      window.addEventListener('DOMContentLoaded', () => {
      const progressComp = document.getElementById("progressComp");
        let value2 = 0;

        let interval = setInterval(() => {
          if (value2 >= 100) {
            value2 = 0; // Reset the value
          } else {
            value2 += 10; // Increment the value
          }
          progressComp.setAttribute("value", value2); // Update the progress component
        }, 1000);

        // Clean up the interval when the window is unloaded or when you want to stop the interval
        window.addEventListener("beforeunload", () => {
          clearInterval(interval);
        });
      });
    </script>
  </body>
</html>
