<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="../../build/stencil-component-library.esm.js"></script>
    <script nomodule src="../../build/stencil-component-library.js"></script>

    <link rel="stylesheet" href="../../build/stencil-component-library.css" />

    <link rel="stylesheet" href="../../assets/mdi/materialdesignicons.min.css" />

    <style>
      .cwrapper {
        margin: 10px;
      }

      button {
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      .purple {
        background-color: purple !important;
        color: white !important;
      }
    </style>
  </head>
  <body>
    <!-- <my-component first="Stencil" middle="'Don't call me a framework'" last="JS"></my-component>
     -->
    <app-wrapper>
      <div class="cwrapper">
        <plumage-autocomplete-multiselect-component
          id="aci3"
          add-btn
          input-id="ac-1"
          editable
          label="Autocomplete Multiselect"
          required
          validation
          validation-message="Please fill in"
          placeholder="Type to search..."
          data-autocomplete="true"
          editable
          add-btn
          form-layout="horizontal"
          label-align="right"
          size="sm"
        ></plumage-autocomplete-multiselect-component>
      </div>
    </app-wrapper>

    <script type="module">
      window.addEventListener('DOMContentLoaded', () => {
        const aci3 = document.getElementById('aci3');
        // keep this mutable so we can mirror updates from the component
        let aci3Options = ['Apple', 'Apparatus', 'Apple Pie', 'Applegate', 'Banana', 'Orange', 'Mango'];

        // 1) Push initial options once the component is ready
        // Either approach works; use ONE of them:

        // A) Using Stencil's componentOnReady()
        aci3.componentOnReady?.().then(async () => {
          await aci3.setOptions(aci3Options);
        });

        // B) Or using customElements.whenDefined(...)
        // customElements.whenDefined('autocomplete-multiselect').then(async () => {
        //   await aci3.setOptions(aci3Options);
        // });

        // 2) Keep your app state in sync when users ADD/DELETE options (editable=true)
        aci3.addEventListener('optionsChange', e => {
          const { options, reason, value } = e.detail || {};
          if (reason === 'replace') {
            console.log('[aci3 optionsChange]', reason, options);
          } else {
            console.log('[aci3 optionsChange]', reason, value, options);
          }
          // (optional) persist somewhere (e.g., localStorage / server)
          localStorage.setItem('aci3Options', JSON.stringify(aci3Options));
        });

        // 3) (Optional) react to selection changes
        aci3.addEventListener('multiSelectChange', e => {
          console.log('[aci3 selectedItems]', e.detail);
        });

        // 4) (Optional) replace options later from your app
        async function refreshFromServer(nextOptions) {
          await aci3.setOptions(nextOptions); // will also emit optionsChange with reason: 'replace'
        }

        // 5) (Optional) read the current options from the component
        async function logCurrentOptions() {
          const opts = await aci3.getOptions();
          console.log('[aci3 getOptions]', opts);
        }
      });
    </script>
  </body>
</html>
