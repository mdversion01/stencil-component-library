<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stencil Component Starter</title>

    <script type="module" src="../../build/stencil-component-library.esm.js"></script>
    <script nomodule src="../../build/stencil-component-library.js"></script>

    <link rel="stylesheet" href="../../build/stencil-component-library.css" />
    <link rel="stylesheet" href="../../assets/mdi/materialdesignicons.min.css" />
    <link rel="stylesheet" href="../../../node_modules/@fortawesome/fontawesome-free/css/all.min.css" />

    <style>
      .cwrapper {
        margin: 10px;
      }

      button {
        border: 1px solid #ccc;
        border-radius: 3px;
      }

      .purple {
        background-color: purple !important;
        color: white !important;
      }

      .example-note {
        margin: 8px 0 16px;
        font-size: 14px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <app-wrapper>
      <div class="cwrapper">
        <form-component>
          <input-group-component
            slot="formField"
            label="Amount"
            label-size="lg"
            size="sm"
            input-id="amount1"
            value="This is a Test"
            has-append
            has-prepend
            prepend-icon="fa-solid fa-dollar-sign"
            append-button
            append-button-id="amounta-btn"
            append-text="Go"
            append-button-variant="secondary"
            form-layout="horizontal"
            label-align="right"
          ></input-group-component>

          <input-group-component
            slot="formField"
            label="Amount"
            input-id="amount"
            has-append
            append-button
            append-button-id="amountb-btn"
            append-text="Go"
            append-button-variant="secondary"
            form-layout="horizontal"
            label-align="right"
          ></input-group-component>

          <input-group-component
            slot="formField"
            label="Amount"
            size="lg"
            input-id="amount2"
            has-append
            append-icon="fa-solid fa-dollar-sign"
            has-prepend
            prepend-icon="fa-solid fa-dollar-sign"
            form-layout="horizontal"
            label-align="right"
          ></input-group-component>

          <input-group-component
            slot="formField"
            label="Search"
            input-id="search-q"
            has-append
            append-button
            append-text="Go"
            append-id="search-affix-wrap"
            append-button-id="search-affix-btn"
          ></input-group-component>
        </form-component>

        <hr />

        <h3>Append button click example</h3>
        <p class="example-note">
          Use the component's <code>appendClick</code> event. Do not attach a click handler to the host
          <code>&lt;input-group-component&gt;</code> when you only want the appended button action.
        </p>

        <input-group-component
          label="Search Users"
          input-id="search-users"
          has-append
          append-button
          append-text="Search"
          append-button-id="search-users-btn"
          append-button-variant="primary"
          placeholder="Enter a name"
        ></input-group-component>

        <div id="search-users-result" class="example-note"></div>
      </div>
    </app-wrapper>

    <script>
      const searchUsersField = document.querySelector('input-group-component[input-id="search-users"]');
      const searchUsersResult = document.getElementById('search-users-result');

      if (searchUsersField) {
        searchUsersField.addEventListener('appendClick', event => {
          const input = searchUsersField.querySelector('input');
          const value = input ? input.value : '';

          console.log('appendClick fired:', event.detail);
          console.log('Current input value:', value);

          searchUsersResult.textContent = value
            ? `Append button clicked. Current value: "${value}"`
            : 'Append button clicked. Input is empty.';
        });
      }
    </script>
  </body>
</html>
